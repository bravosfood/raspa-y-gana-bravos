<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bravo's Food - Raspá y Ganá</title>
<meta property="og:title" content="🎁 Bravo's Food - Raspá y Ganá">

<meta property="og:description" content="Ganate descuentos, papas, refrescos y hasta hamburguesas gratis 🍔🔥">

<meta property="og:image" content="https://bravosfood.github.io/raspa-y-gana-bravos/preview.jpg.png">

<meta property="og:url" content="https://bravosfood.github.io/raspa-y-gana-bravos/">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
overflow:hidden;
color:white;
position:relative;
}

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.88)),
url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1200');
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:'';
position:fixed;
inset:0;
background:radial-gradient(circle at top,#ff7b0018,transparent 60%);
z-index:-1;
}

.container{
width:100%;
max-width:430px;
background:rgba(18,18,18,.92);
backdrop-filter:blur(10px);
border:1px solid rgba(255,153,0,.18);
border-radius:30px;
padding:28px 24px;
box-shadow:
0 0 40px rgba(255,140,0,.18),
0 10px 40px rgba(0,0,0,.5);
animation:fade .5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:38px;
font-weight:700;
color:#ff9900;
margin-bottom:6px;
}

.sub{
text-align:center;
font-size:15px;
color:#ddd;
margin-bottom:28px;
line-height:1.5;
}

.input-group{
margin-bottom:14px;
}

input{
width:100%;
padding:17px;
border:none;
outline:none;
border-radius:16px;
background:#232323;
color:white;
font-size:16px;
border:2px solid transparent;
transition:.2s;
}

input:focus{
border-color:#ff9900;
}

button{
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff9900,#ff5e00);
color:black;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
margin-top:8px;
box-shadow:0 6px 20px rgba(255,120,0,.3);
}

button:active{
transform:scale(.98);
}

.loading{
display:none;
text-align:center;
margin-top:20px;
font-size:15px;
color:#ffcc80;
}

#scratchSection{
display:none;
margin-top:28px;
animation:fade .4s ease;
}

.scratch-title{
text-align:center;
margin-bottom:14px;
font-size:16px;
color:#ffcc80;
}

.scratch-wrapper{
position:relative;
width:100%;
height:240px;
border-radius:26px;
overflow:hidden;
border:3px solid #ff9900;
box-shadow:
0 0 25px rgba(255,153,0,.28),
inset 0 0 30px rgba(255,255,255,.05);
background:#111;
}

#premio{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(135deg,#ff9900,#ff5e00);
font-size:34px;
font-weight:700;
line-height:1.2;
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
touch-action:none;
background:
linear-gradient(135deg,#cfcfcf,#8f8f8f);
}

.scratch-text{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:700;
color:#444;
pointer-events:none;
letter-spacing:2px;
}

.info{
margin-top:18px;
text-align:center;
font-size:14px;
color:#ccc;
line-height:1.5;
}

.success{
margin-top:18px;
padding:16px;
border-radius:18px;
background:#1f1f1f;
text-align:center;
display:none;
border:1px solid rgba(255,153,0,.25);
}

.success strong{
display:block;
font-size:16px;
margin-bottom:5px;
color:#ffcc80;
}

.error{
display:none;
margin-top:18px;
background:#2a1414;
border:1px solid #ff5a5a55;
padding:15px;
border-radius:16px;
text-align:center;
color:#ffb0b0;
font-size:14px;
line-height:1.4;
}

.footer{
margin-top:24px;
text-align:center;
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🎁 Bravo's</div>

<div class="sub">
Raspá y ganá premios exclusivos en tu próximo pedido 🍔🔥
</div>

<div class="input-group">
<input type="text" id="nombre" placeholder="Tu nombre">
</div>

<div class="input-group">
<input type="tel" id="telefono" placeholder="Tu teléfono">
</div>

<button onclick="jugar()">
JUGAR AHORA
</button>

<div class="loading" id="loading">
Consultando tu raspadita...
</div>

<div class="error" id="error"></div>

<div id="scratchSection">

<div class="scratch-title">
Raspá con tu dedo 👇
</div>

<div class="scratch-wrapper">

<div id="premio"></div>

<canvas id="scratchCanvas"></canvas>

<div class="scratch-text">
RASPÁ
</div>

</div>

<div class="success" id="success">
<strong>🎉 Premio desbloqueado</strong>
Mostralo en tu próximo pedido de Bravo's Food 🍔
</div>

<div class="info">
Cuanto más raspes, más rápido descubrirás tu premio ✨
</div>

</div>

<div class="footer">
Bravo's Food ©
</div>

</div>

<script>

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzBgfPWe6VhDUEgmHWRKwnxJCpybixVhj0tT3xXpu7Xjt61Y5xO5N_xoVd37X44QEm6/exec';

let canvas;
let ctx;
let isDrawing=false;
let revealed=false;

async function jugar(){

const nombre=document.getElementById('nombre').value.trim();

let telefono=document.getElementById('telefono').value.trim();

telefono=telefono.replace(/\s+/g,'');

const loading=document.getElementById('loading');
const error=document.getElementById('error');

error.style.display='none';

if(!nombre || !telefono){

mostrarError('Completá todos los campos.');

return;

}

loading.style.display='block';

try{

const respuesta = await fetch(SCRIPT_URL,{
method:'POST',
body:JSON.stringify({
nombre:nombre,
telefono:telefono
})
});

const data = await respuesta.json();

loading.style.display='none';

if(!data.permitido){

mostrarError(data.mensaje);
return;

}

document.getElementById('premio').innerHTML =
'🎉<br>' + data.premio;

document.getElementById('scratchSection').style.display='block';

iniciarRaspado();

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}catch(e){

loading.style.display='none';

mostrarError('Ocurrió un error. Intentá nuevamente.');

}

}

function mostrarError(msg){

const error=document.getElementById('error');

error.innerHTML=msg;

error.style.display='block';

}

function iniciarRaspado(){

canvas=document.getElementById('scratchCanvas');

ctx=canvas.getContext('2d');

canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;

ctx.fillStyle='#b5b5b5';

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation='destination-out';

canvas.addEventListener('touchstart',start);
canvas.addEventListener('touchmove',draw);
canvas.addEventListener('touchend',stop);

canvas.addEventListener('mousedown',start);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',stop);

}

function getPosition(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){

return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
};

}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
};

}

function start(e){

isDrawing=true;

draw(e);

}

function stop(){

isDrawing=false;

checkReveal();

}

function draw(e){

if(!isDrawing) return;

e.preventDefault();

const pos=getPosition(e);

ctx.beginPath();

ctx.arc(pos.x,pos.y,28,0,Math.PI*2);

ctx.fill();

}

function checkReveal(){

if(revealed) return;

const imageData = ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

const pixels = imageData.data;

let transparent=0;

for(let i=3;i<pixels.length;i+=4){

if(pixels[i] < 128){
transparent++;
}

}

const percent =
transparent / (pixels.length / 4);

if(percent > 0.35){

revealed=true;

canvas.style.transition='opacity .5s';

canvas.style.opacity='0';

document.querySelector('.scratch-text').style.display='none';

document.getElementById('success').style.display='block';

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

}

}

</script>

</body>
</html>
