<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspá y Ganá - Bravo's Food</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1c1c1c;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 20px rgba(255,165,0,.4);
}

h1{
color:#ff9900;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#ff9900;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

#resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h1>🎁 Raspá y Ganá</h1>

<p>Bravo's Food</p>

<input type="text" id="nombre" placeholder="Tu nombre">

<input type="text" id="telefono" placeholder="Tu teléfono">

<button onclick="jugar()">Descubrir Premio</button>

<div id="resultado"></div>

</div>

<script>

async function jugar(){

const nombre=document.getElementById('nombre').value;
const telefono=document.getElementById('telefono').value;

if(!nombre || !telefono){
alert('Completa todos los campos');
return;
}

const respuesta = await fetch(
'https://script.google.com/macros/s/AKfycbzBgfPWe6VhDUEgmHWRKwnxJCpybixVhj0tT3xXpu7Xjt61Y5xO5N_xoVd37X44QEm6/exec',
{
method:'POST',
body:JSON.stringify({
nombre:nombre,
telefono:telefono
})
}
);

const data = await respuesta.json();

if(data.permitido){
document.getElementById('resultado').innerHTML =
'🎉 Ganaste: <br><br>' + data.premio;
}else{
document.getElementById('resultado').innerHTML =
data.mensaje;
}

}

</script>

</body>
</html>
